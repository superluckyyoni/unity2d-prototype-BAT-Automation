name: Unity PlayMode BAT Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  playmode-test:
    name: Run Unity PlayMode BAT Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run PlayMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.1.10f1
          testMode: PlayMode
          projectPath: .
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-playmode-test-results
          path: artifacts

      - name: Send Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import os
          import json
          import glob
          import urllib.request
          import xml.etree.ElementTree as ET

          webhook_url = os.environ["DISCORD_WEBHOOK_URL"]
          job_status = os.environ["JOB_STATUS"]
          run_url = os.environ["RUN_URL"]

          result_files = glob.glob("artifacts/**/*results.xml", recursive=True)
          if not result_files:
              result_files = glob.glob("artifacts/**/*.xml", recursive=True)

          total = None
          passed = None
          failed = None
          failed_tests = []

          def get_child_text(parent, child_name):
              child = parent.find(child_name)
              if child is not None and child.text:
                  return child.text.strip()
              return ""

          if result_files:
              result_file = result_files[0]

              try:
                  tree = ET.parse(result_file)
                  root = tree.getroot()

                  total = root.attrib.get("total")
                  passed = root.attrib.get("passed")
                  failed = root.attrib.get("failed")

                  for test_case in root.iter("test-case"):
                      result = test_case.attrib.get("result") or test_case.attrib.get("outcome")

                      if result == "Failed":
                          test_name = (
                              test_case.attrib.get("fullname")
                              or test_case.attrib.get("name")
                              or "Unknown Test"
                          )

                          failure = test_case.find("failure")
                          message = ""
                          stack_trace = ""

                          if failure is not None:
                              message = get_child_text(failure, "message")
                              stack_trace = get_child_text(failure, "stack-trace")

                          # 메시지가 너무 길면 디스코드 가독성을 위해 자름
                          if message:
                              message = message.replace("\n", " ").strip()
                              if len(message) > 300:
                                  message = message[:300] + "..."

                          # 스택트레이스에서 Assets 경로가 포함된 첫 줄만 추출
                          location = ""
                          if stack_trace:
                              for line in stack_trace.splitlines():
                                  line = line.strip()
                                  if "Assets/" in line:
                                      location = line
                                      break

                          failed_tests.append({
                              "name": test_name,
                              "message": message,
                              "location": location
                          })

              except Exception as e:
                  failed_tests.append({
                      "name": "Result parse failed",
                      "message": str(e),
                      "location": ""
                  })

          lines = []

          if job_status == "success":
              if total and passed:
                  lines.append(f"✅ Unity BAT 결과: {passed}개 전부 통과!! 빌드는 테스트 가능합니다.")
              else:
                  lines.append("✅ Unity BAT 결과: 전부 통과!! 빌드는 테스트 가능합니다.")

          else:
              if passed is not None and failed is not None:
                  lines.append(f"❌ Unity BAT 결과: {passed}개 통과 / {failed}개 실패! 빌드 확인 필요!")
              else:
                  lines.append("❌ Unity BAT 결과: 실패! 빌드 확인 필요!")

              if failed_tests:
                  lines.append("")
                  lines.append("실패 항목:")

                  for index, item in enumerate(failed_tests[:5], start=1):
                      lines.append(f"{index}. {item['name']}")

                      if item["message"]:
                          lines.append(f"   - 사유: {item['message']}")

                      if item["location"]:
                          lines.append(f"   - 위치: {item['location']}")

                  if len(failed_tests) > 5:
                      lines.append(f"...외 {len(failed_tests) - 5}개 실패 항목은 Actions 로그에서 확인 필요")
              else:
                  lines.append("")
                  lines.append("실패 항목 상세를 결과 XML에서 찾지 못했습니다.")

          lines.append("")
          lines.append(f"🔗 Actions 로그: {run_url}")

          content = "\n".join(lines)

          # Discord 메시지 길이 제한 대비
          if len(content) > 1900:
              content = content[:1900] + "\n...메시지가 길어 일부 생략되었습니다."

          payload = {
              "username": "Captain Hook",
              "content": content
          }

          req = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )

          urllib.request.urlopen(req)
          PY